<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CodeRemote</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; min-height: 100vh; color: #fff; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px; position: sticky; top: 0; }
        .header h1 { font-size: 18px; text-align: center; }
        .status { text-align: center; padding: 8px; font-size: 12px; background: rgba(255,255,255,0.2); border-radius: 15px; margin-top: 8px; }
        .status.connected { background: #10b981; }
        .content { padding: 15px; }
        .settings { background: #16213e; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .settings label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .settings input { width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: #fff; font-size: 13px; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:disabled { opacity: 0.5; }
        .messages { background: #16213e; border-radius: 12px; height: 350px; overflow-y: auto; padding: 12px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 10px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .message.sent { background: linear-gradient(135deg, #667eea, #764ba2); margin-left: auto; }
        .message.received { background: #0f3460; }
        .input-area { display: flex; gap: 8px; position: sticky; bottom: 0; background: #1a1a2e; padding: 10px 0; }
        .input-area input { flex: 1; padding: 12px 15px; border: 1px solid #0f3460; border-radius: 25px; background: #16213e; color: #fff; }
        .input-area button { padding: 12px 20px; border: none; border-radius: 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔗 CodeRemote</h1>
        <div class="status" id="status">未连接</div>
    </div>
    <div class="content"><div id="debug" style="background:#0f3460;padding:10px;border-radius:8px;margin-bottom:10px;font-size:11px;font-family:monospace;max-height:150px;overflow-y:auto;"></div>
        <div class="settings" id="settings">
            <label>服务器 URL</label>
            <input type="text" id="serverUrl" value="wss://there-levitra-cabinet-syndicate.trycloudflare.com" placeholder="wss://there-levitra-cabinet-syndicate.trycloudflare.com">
            <label>认证 Token</label>
            <input type="text" id="token" value="ffc5100e-52ce-49ca-b0d7-eeed59a930e5" placeholder="Token">
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" id="connectBtn" onclick="toggleConnect()">连接</button>
            <button class="btn btn-primary" onclick="clearMessages()" style="background:#4a5568">清空</button>
        </div>
        <div class="messages" id="messages"><div style="text-align: center; color: #64748b; padding: 30px;">👆 点击"连接"开始使用</div></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>发送</button>
        </div>
    </div>
    <script>
        let ws=null,isConnected=false;
        function updateStatus(s,t){
    const el=document.getElementById('status');
    el.className='status '+s;
    el.textContent=t;
    const debug=document.getElementById('debug');
    if(debug)debug.innerHTML='['+new Date().toLocaleTimeString()+'] '+t+'<br>'+debug.innerHTML;
}
        function addMessage(c,t){const el=document.getElementById('messages');const m=document.createElement('div');m.className='message '+t;m.innerHTML=c+'<div style="font-size:10px;opacity:0.7;margin-top:4px;">'+new Date().toLocaleTimeString()+'</div>';el.appendChild(m);el.scrollTop=el.scrollHeight;}
        function toggleConnect(){isConnected?disconnect():connect();}
        function connect(){
            const url=document.getElementById('serverUrl').value.trim();
            const token=document.getElementById('token').value.trim();
            if(!url||!token){alert('请输入 URL 和 Token');return;}
            updateStatus('connecting','连接中...');
            document.getElementById('connectBtn').disabled=true;
            try{
                ws=new WebSocket(url);
                ws.onopen=()=>{ws.send(JSON.stringify({type:'auth',token:token}));};
                ws.onmessage=e=>{
                    try{const d=JSON.parse(e.data);
                    if(d.type==='auth_success'){isConnected=true;updateStatus('connected','✅ 已连接');document.getElementById('connectBtn').textContent='断开';document.getElementById('connectBtn').disabled=false;document.getElementById('messageInput').disabled=false;document.getElementById('sendBtn').disabled=false;document.getElementById('settings').style.display='none';addMessage('✅ 连接成功！','received');}
                    else if(d.type==='auth_failed'){updateStatus('','❌ 认证失败');document.getElementById('connectBtn').disabled=false;addMessage('❌ Token错误','received');}
                    else if(d.content){addMessage(d.content,'received');}
                    }catch(x){addMessage(e.data,'received');}
                };
                ws.onerror=e=>{
    updateStatus('','❌ 错误');
    document.getElementById('connectBtn').disabled=false;
    const debug=document.getElementById('debug');
    if(debug)debug.innerHTML='[错误] '+JSON.stringify(e)+'</br>'+debug.innerHTML;
    };
                ws.onclose=()=>{isConnected=false;updateStatus('','未连接');document.getElementById('connectBtn').textContent='连接';document.getElementById('connectBtn').disabled=false;document.getElementById('messageInput').disabled=true;document.getElementById('sendBtn').disabled=true;document.getElementById('settings').style.display='block';};
            }catch(e){updateStatus('','❌ 失败');document.getElementById('connectBtn').disabled=false;alert('连接失败:'+e.message);}
        }
        function disconnect(){if(ws){ws.close();ws=null;}}
        function sendMessage(){const i=document.getElementById('messageInput');const c=i.value.trim();if(!c||!isConnected)return;ws.send(JSON.stringify({type:'message',content:c}));addMessage(c,'sent');i.value='';}
        function clearMessages(){document.getElementById('messages').innerHTML='<div style="text-align: center; color: #64748b; padding: 30px;">消息已清空</div>';}
        document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>CodeRemote</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:#1a1a2e;min-height:100vh;color:#fff;padding:15px}
        .h{background:linear-gradient(135deg,#10b981,#059669);padding:15px;border-radius:12px;margin-bottom:15px}
        .h h1{font-size:20px;text-align:center}
        .s{text-align:center;padding:10px;font-size:14px;background:rgba(255,255,255,0.2);border-radius:20px;margin-top:10px;font-weight:600}
        .s.connected{background:#10b981}
        .m{background:#16213e;border-radius:12px;padding:15px;margin-bottom:15px}
        .m label{display:block;font-size:13px;color:#94a3b8;margin-bottom:8px}
        .m input{width:100%;padding:12px;border:1px solid #0f3460;border-radius:8px;background:#0f3460;color:#fff;font-size:14px;margin-bottom:12px}
        .b{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;margin-bottom:10px}
        .b-primary{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
        .b:disabled{opacity:.5}
        .ms{background:#16213e;border-radius:12px;height:350px;overflow-y:auto;padding:15px;margin-bottom:15px}
        .msg{margin-bottom:10px;padding:12px;border-radius:12px;max-width:80%;font-size:15px}
        .msg.sent{background:linear-gradient(135deg,#10b981,#059669);margin-left:auto}
        .msg.received{background:#0f3460}
        .ia{display:flex;gap:10px}
        .ia input{flex:1;padding:14px;border:1px solid #0f3460;border-radius:25px;background:#16213e;color:#fff;font-size:15px}
        .ia button{padding:14px 24px;border:none;border-radius:25px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-weight:600}
        .sw{display:flex;gap:8px;margin-bottom:10px}
        .sw button{flex:1;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:600;background:#16213e;color:#94a3b8}
        .sw button.active{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
    </style>
</head>
<body>
    <div class="h">
        <h1>CodeRemote</h1>
        <div class="s" id="s">未连接</div>
    </div>
    <div class="sw">
        <button id="l" onclick="u('l')" class="active">本地WiFi</button>
        <button id="r" onclick="u('r')">外网</button>
    </div>
    <div class="m" id="m">
        <label>服务器地址</label>
        <input id="u" value="ws://192.168.5.23:8082">
        <label>Token</label>
        <input id="t" value="ffc5100e-52ce-49ca-b0d7-eeed59a930e5">
    </div>
    <button class="b b-primary" id="cb" onclick="c()">连接</button>
    <div class="ms" id="ms">
        <div style="text-align:center;color:#64748b;padding:30px;">点击连接开始使用</div>
    </div>
    <div class="m" style="text-align:center">
        <h3 style="font-size:14px;color:#94a3b8;margin-bottom:10px">📷 接收的图片</h3>
        <div id="imageContainer" style="background:#0f3460;border-radius:8px;padding:15px;">
            <div style="color:#64748b;font-size:12px">等待接收图片...</div>
        </div>
    </div>
    <div class="ia">
        <input id="mi" placeholder="输入消息..." disabled>
        <button id="mb" onclick="e()" disabled>发送</button>
    </div>
    <script>
        let w=null,I=!1,M='l',P=null,J=null;
        const C={
            l:{u:'ws://192.168.5.23:8082',i:'本地WiFi - 同一网络'},
            r:{u:'wss://there-levitra-cabinet-syndicate.trycloudflare.com',i:'外网 - 任何地方'}
        };
        function U(m){
            M=m;
            document.getElementById('l').className='sw button'+(m==='l'?' active':'');
            document.getElementById('r').className='sw button'+(m==='r'?' active':'');
            document.getElementById('u').value=C[m].u;
            if(I){
                d();
                x('已切换到'+(m==='l'?'本地':'外网')+'模式，请重连','received')
            }
        }
        function S(e,t){
            const el=document.getElementById('s');
            el.className='s '+e;
            el.textContent=t
        }
        function x(c,t){
            const el=document.getElementById('ms');
            const m=document.createElement('div');
            m.className='msg '+t;
            m.innerHTML=c+'<div style="font-size:10px;opacity:.7;margin-top:4px">'+new Date().toLocaleTimeString()+'</div>';
            el.appendChild(m);
            el.scrollTop=el.scrollHeight
        }
        function c(){
            const u=document.getElementById('u').value.trim(),
                  t=document.getElementById('t').value.trim();
            if(!u||!t){
                alert('请输入地址和Token');
                return
            }
            S('connecting','连接中...');
            document.getElementById('cb').disabled=!0;
            x('正在连接...','received');
            try{
                w=new WebSocket(u);
                w.binaryType = 'arraybuffer';
                w.onopen=()=>{
                    x('连接成功，验证...','received');
                    w.send(JSON.stringify({type:'auth',token:t}))
                };
                w.onmessage=e=>{
                    const data=e.data;
                    // 处理 ArrayBuffer (图片数据)
                    if(data instanceof ArrayBuffer){
                        if(!P){
                            x('⚠️ 收到图片数据但没有元数据','error');
                            return
                        }
                        if(P){
                            if(J){URL.revokeObjectURL(J)}
                            const blob=new Blob([data],{type:P.mimeType}),url=URL.createObjectURL(blob),container=document.getElementById('imageContainer');
                            J=url;
                            container.innerHTML=`<img src="${url}" style="max-width:100%;border-radius:8px;margin-bottom:10px"><div style="color:#10b981;font-size:12px"></div>`;
                            container.querySelector('div').textContent=`${P.fileName} (${(P.size/1024).toFixed(1)} KB)`;
                            x(`📷 接收图片: ${P.fileName}`,'received');
                            P=null
                        }
                        return
                    }
                    // 处理 JSON 消息
                    try{
                        const d=JSON.parse(data);
                        if(d.type==='auth_success'){
                            I=!0;
                            S('connected','已连接');
                            document.getElementById('cb').textContent='断开';
                            document.getElementById('cb').disabled=!1;
                            document.getElementById('mi').disabled=!1;
                            document.getElementById('mb').disabled=!1;
                            document.getElementById('m').style.display='none';
                            document.querySelector('.sw').style.display='none';
                            x('连接成功! Client:'+d.clientId,'received')
                        }else if(d.type==='auth_failed'){
                            S('','认证失败');
                            document.getElementById('cb').disabled=!1;
                            x('Token错误','received')
                        }else if(d.type==='image_saved'){
                            x(`✅ 图片已保存: ${d.path}`,'received')
                        }else if(d.type==='image_error'){
                            x(`❌ 图片错误 [${d.code}]: ${d.error}`,'received')
                        }else if(d.type==='image_meta'){
                            P=d;
                            x(`准备接收图片: ${d.fileName}`,'received')
                        }else if(d.content)x(d.content,'received')
                    }catch(n){
                        x(data,'received')
                    }
                };
                w.onerror=()=>{
                    S('','连接失败');
                    document.getElementById('cb').disabled=!1;
                    x('无法连接，请检查网络','received')
                };
                w.onclose=()=>{
                    I=!1;
                    S('','未连接');
                    document.getElementById('cb').textContent='连接';
                    document.getElementById('cb').disabled=!1;
                    document.getElementById('mi').disabled=!0;
                    document.getElementById('mb').disabled=!0;
                    document.getElementById('m').style.display='block';
                    document.querySelector('.sw').style.display='flex';
                    x('已断开','received')
                }
            }catch(e){
                S('','连接失败');
                document.getElementById('cb').disabled=!1;
                x('错误:'+e.message,'received')
            }
        }
        function d(){
            if(w){
                w.close();
                w=null
            }
        }
        function e(){
            const i=document.getElementById('mi'),
                  c=i.value.trim();
            if(!c||!I)return;
            w.send(JSON.stringify({type:'message',content:c}));
            x(c,'sent');
            i.value=''
        }
        document.getElementById('mi').addEventListener('keypress',e=>{if(e.key==='Enter')e()});

        // 图片上传功能
        document.getElementById('cb').insertAdjacentHTML('afterend', `
          <input type="file" id="imageInput" accept="image/*" style="display:none">
          <button class="b b-primary" onclick="document.getElementById('imageInput').click()" style="margin-top:10px">
            📷 上传图片
          </button>
        `);

        document.getElementById('imageInput').addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file || !w || w.readyState !== 1) {
            x('❌ 请先连接服务器', 'received');
            e.target.value = '';
            return;
          }

          x(`📷 开始上传: ${file.name} (${(file.size/1024).toFixed(1)} KB)`, 'sent');

          try {
            // 发送元数据
            w.send(JSON.stringify({
              type: 'image_meta',
              fileName: file.name,
              mimeType: file.type,
              size: file.size,
              timestamp: Date.now()
            }));

            // 发送二进制数据
            const arrayBuffer = await file.arrayBuffer();
            w.send(arrayBuffer);

            x('图片数据已发送', 'sent');
          } catch (err) {
            x(`❌ 上传失败: ${err.message}`, 'sent');
          }

          e.target.value = '';
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeRemote - Web 测试界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
        }

        .status-badge.connected {
            background: #10b981;
        }

        .status-badge.connecting {
            background: #f59e0b;
        }

        .status-badge.error {
            background: #ef4444;
        }

        .content {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .messages {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #f9fafb;
            margin-bottom: 15px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
        }

        .message.received {
            background: white;
            border: 1px solid #e5e7eb;
            color: #374151;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .connection-info {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .connection-info h3 {
            color: #166534;
            margin-bottom: 5px;
        }

        .connection-info p {
            color: #15803d;
            margin: 2px 0;
        }

        .connection-info code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 CodeRemote</h1>
            <span class="status-badge" id="status">未连接</span>
        </div>

        <div class="content">
            <div class="connection-info">
                <h3>📍 连接信息</h3>
                <p>服务器: <code>ws://192.168.5.23:8082</code></p>
                <p>Token: <code id="tokenDisplay">ffc5100e...</code></p>
            </div>

            <div class="form-group">
                <label>服务器 URL</label>
                <input type="text" id="serverUrl" value="ws://192.168.5.23:8082" placeholder="ws://localhost:8082">
            </div>

            <div class="form-group">
                <label>认证 Token</label>
                <input type="text" id="token" value="ffc5100e-52ce-49ca-b0d7-eeed59a930e5" placeholder="输入从 CLI 获取的 Token">
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="connectBtn" onclick="toggleConnect()">连接</button>
                <button class="btn btn-secondary" onclick="clearMessages()">清空消息</button>
            </div>

            <div class="messages" id="messages">
                <div style="text-align: center; color: #9ca3af; padding: 20px;">
                    输入服务器 URL 和 Token，然后点击连接
                </div>
            </div>

            <div class="input-group">
                <input type="text" id="messageInput" placeholder="输入消息..." disabled>
                <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>发送</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;

        function updateStatus(status, text) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status-badge ' + status;
            statusEl.textContent = text;
        }

        function addMessage(content, type) {
            const messagesEl = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = 'message ' + type;
            messageEl.innerHTML = `
                ${content}
                <div class="time">${new Date().toLocaleTimeString()}</div>
            `;
            messagesEl.appendChild(messageEl);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function toggleConnect() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const url = document.getElementById('serverUrl').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!url || !token) {
                alert('请输入服务器 URL 和 Token');
                return;
            }

            updateStatus('connecting', '连接中...');
            document.getElementById('connectBtn').disabled = true;

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    // 发送认证
                    ws.send(JSON.stringify({
                        type: 'auth',
                        token: token
                    }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);

                        if (data.type === 'auth_success') {
                            isConnected = true;
                            updateStatus('connected', '已连接');
                            document.getElementById('connectBtn').textContent = '断开';
                            document.getElementById('connectBtn').disabled = false;
                            document.getElementById('messageInput').disabled = false;
                            document.getElementById('sendBtn').disabled = false;
                            document.getElementById('tokenDisplay').textContent = token.substring(0, 8) + '...';
                            addMessage('✅ 连接成功！', 'received');
                        } else if (data.type === 'auth_failed') {
                            updateStatus('error', '认证失败');
                            document.getElementById('connectBtn').disabled = false;
                            addMessage('❌ 认证失败，请检查 Token', 'received');
                        } else if (data.type === 'message' || data.content) {
                            addMessage(data.content || event.data, 'received');
                        } else {
                            addMessage(event.data, 'received');
                        }
                    } catch (e) {
                        addMessage(event.data, 'received');
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateStatus('error', '连接错误');
                    document.getElementById('connectBtn').disabled = false;
                };

                ws.onclose = () => {
                    isConnected = false;
                    updateStatus('', '未连接');
                    document.getElementById('connectBtn').textContent = '连接';
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('messageInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    addMessage('🔌 连接已断开', 'received');
                };
            } catch (error) {
                updateStatus('error', '连接失败');
                document.getElementById('connectBtn').disabled = false;
                alert('连接失败: ' + error.message);
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();

            if (!content || !isConnected) return;

            ws.send(JSON.stringify({
                type: 'message',
                content: content
            }));

            addMessage(content, 'sent');
            input.value = '';
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '<div style="text-align: center; color: #9ca3af; padding: 20px;">消息已清空</div>';
        }

        // 回车发送消息
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>

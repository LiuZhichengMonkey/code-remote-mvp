<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeRemote - 纯 JS 示例</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #333;
    }

    .header h1 {
      font-size: 18px;
      color: #e94560;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #888;
    }

    .status-dot.connected {
      background: #4ade80;
    }

    .status-dot.connecting {
      background: #fbbf24;
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
    }

    .connect-form {
      background: #16213e;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #e94560;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #e94560;
      color: white;
    }

    .btn-primary:hover {
      background: #c73e54;
    }

    .btn-secondary {
      background: #333;
      color: #eee;
    }

    .btn-secondary:hover {
      background: #444;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .message {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
    }

    .message.user {
      background: #e94560;
      margin-left: 20%;
    }

    .message.assistant {
      background: #2a2a4e;
      margin-right: 20%;
    }

    .message.error {
      background: #7f1d1d;
    }

    .message .role {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .message .content {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .input-area {
      display: flex;
      gap: 12px;
    }

    .input-area textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
      resize: none;
      min-height: 50px;
    }

    .input-area textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .typing {
      text-align: center;
      padding: 8px;
      color: #888;
      font-size: 14px;
    }

    .typing::after {
      content: '...';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CodeRemote</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">未连接</span>
    </div>
    <button class="btn btn-secondary" id="disconnectBtn" disabled>断开</button>
  </div>

  <div class="main">
    <!-- 连接表单 -->
    <div class="connect-form" id="connectForm">
      <div class="form-group">
        <label>服务器地址</label>
        <input type="text" id="serverUrl" value="ws://localhost:8080" placeholder="ws://localhost:8080">
      </div>
      <div class="form-group">
        <label>Token</label>
        <input type="text" id="token" placeholder="输入认证 Token">
      </div>
      <button class="btn btn-primary" id="connectBtn">连接</button>
    </div>

    <!-- 消息列表 -->
    <div class="messages hidden" id="messagesContainer">
      <!-- 消息会动态插入这里 -->
    </div>

    <!-- 输入区域 -->
    <div class="input-area hidden" id="inputArea">
      <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
      <button class="btn btn-primary" id="sendBtn">发送</button>
    </div>

    <!-- 正在输入提示 -->
    <div class="typing hidden" id="typingIndicator">Claude 正在处理</div>
  </div>

  <script>
    // CodeRemote 客户端类
    class CodeRemoteClient {
      constructor() {
        this.ws = null;
        this.isConnected = false;
        this.isAuthenticated = false;
        this.clientId = null;
      }

      // 连接服务器
      connect(url, token) {
        return new Promise((resolve, reject) => {
          this.ws = new WebSocket(url);
          this.token = token;

          this.ws.onopen = () => {
            this.isConnected = true;
            // 发送认证
            this.send({ type: 'auth', token });
          };

          this.ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            this.handleMessage(msg, resolve, reject);
          };

          this.ws.onerror = (error) => {
            reject(error);
          };

          this.ws.onclose = () => {
            this.isConnected = false;
            this.isAuthenticated = false;
            if (this.onDisconnect) this.onDisconnect();
          };
        });
      }

      // 处理消息
      handleMessage(msg, resolve, reject) {
        switch (msg.type) {
          case 'auth_success':
            this.isAuthenticated = true;
            this.clientId = msg.clientId;
            resolve(msg);
            break;

          case 'auth_failed':
            reject(new Error('认证失败'));
            break;

          case 'message':
            if (this.onMessage) {
              this.onMessage(msg.content, msg.isStreaming, msg);
            }
            break;

          case 'error':
            if (this.onError) {
              this.onError(msg.content);
            }
            break;

          case 'session_list':
            if (this.onSessionList) {
              this.onSessionList(msg.sessions);
            }
            break;

          case 'session_created':
            if (this.onSessionCreated) {
              this.onSessionCreated(msg.sessionId);
            }
            break;
        }
      }

      // 发送消息
      send(data) {
        if (!this.ws || !this.isConnected) {
          throw new Error('未连接');
        }
        this.ws.send(JSON.stringify(data));
      }

      // 发送聊天消息
      sendMessage(content) {
        this.send({ type: 'message', content });
      }

      // 创建新会话
      createSession() {
        this.send({ type: 'session', action: 'new' });
      }

      // 获取会话列表
      listSessions() {
        this.send({ type: 'session', action: 'list' });
      }

      // 恢复会话
      resumeSession(sessionId) {
        this.send({ type: 'session', action: 'resume', sessionId });
      }

      // 断开连接
      disconnect() {
        if (this.ws) {
          this.ws.close();
          this.ws = null;
        }
        this.isConnected = false;
        this.isAuthenticated = false;
      }
    }

    // DOM 元素
    const elements = {
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      connectForm: document.getElementById('connectForm'),
      connectBtn: document.getElementById('connectBtn'),
      disconnectBtn: document.getElementById('disconnectBtn'),
      serverUrl: document.getElementById('serverUrl'),
      token: document.getElementById('token'),
      messagesContainer: document.getElementById('messagesContainer'),
      inputArea: document.getElementById('inputArea'),
      messageInput: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      typingIndicator: document.getElementById('typingIndicator')
    };

    // 客户端实例
    const client = new CodeRemoteClient();

    // 当前消息内容（用于流式更新）
    let currentMessageContent = '';
    let currentMessageElement = null;

    // 更新状态显示
    function updateStatus(status, text) {
      elements.statusDot.className = 'status-dot ' + status;
      elements.statusText.textContent = text;
    }

    // 添加消息到列表
    function addMessage(role, content, isError = false) {
      const div = document.createElement('div');
      div.className = 'message ' + role + (isError ? ' error' : '');
      div.innerHTML = `
        <div class="role">${role === 'user' ? '你' : role === 'assistant' ? 'Claude' : '系统'}</div>
        <div class="content">${escapeHtml(content)}</div>
      `;
      elements.messagesContainer.appendChild(div);
      elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
      return div;
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 更新当前消息（流式）
    function updateCurrentMessage(content) {
      if (currentMessageElement) {
        currentMessageElement.querySelector('.content').textContent = content;
        elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
      }
    }

    // 设置事件处理器
    client.onMessage = (content, isStreaming, msg) => {
      if (isStreaming) {
        // 流式消息
        currentMessageContent += content;
        elements.typingIndicator.classList.remove('hidden');

        if (!currentMessageElement) {
          currentMessageElement = addMessage('assistant', currentMessageContent);
        } else {
          updateCurrentMessage(currentMessageContent);
        }
      } else {
        // 消息完成
        elements.typingIndicator.classList.add('hidden');
        currentMessageContent = '';
        currentMessageElement = null;
      }
    };

    client.onError = (error) => {
      addMessage('error', error, true);
      elements.typingIndicator.classList.add('hidden');
    };

    client.onDisconnect = () => {
      updateStatus('error', '连接已断开');
      elements.connectForm.classList.remove('hidden');
      elements.messagesContainer.classList.add('hidden');
      elements.inputArea.classList.add('hidden');
      elements.disconnectBtn.disabled = true;
    };

    client.onSessionCreated = (sessionId) => {
      console.log('会话已创建:', sessionId);
    };

    // 连接按钮点击
    elements.connectBtn.addEventListener('click', async () => {
      const url = elements.serverUrl.value.trim();
      const token = elements.token.value.trim();

      if (!url || !token) {
        alert('请填写服务器地址和 Token');
        return;
      }

      elements.connectBtn.disabled = true;
      updateStatus('connecting', '连接中...');

      try {
        await client.connect(url, token);
        updateStatus('connected', '已连接');
        elements.connectForm.classList.add('hidden');
        elements.messagesContainer.classList.remove('hidden');
        elements.inputArea.classList.remove('hidden');
        elements.disconnectBtn.disabled = false;

        // 添加欢迎消息
        addMessage('system', '已连接到 CodeRemote。发送消息开始对话！');

        // 创建新会话
        client.createSession();
      } catch (error) {
        updateStatus('error', '连接失败');
        elements.connectBtn.disabled = false;
        alert('连接失败: ' + error.message);
      }
    });

    // 断开按钮点击
    elements.disconnectBtn.addEventListener('click', () => {
      client.disconnect();
    });

    // 发送消息
    function sendMessage() {
      const content = elements.messageInput.value.trim();
      if (!content) return;

      // 添加用户消息
      addMessage('user', content);

      // 发送到服务器
      client.sendMessage(content);

      // 清空输入
      elements.messageInput.value = '';

      // 重置流式消息状态
      currentMessageContent = '';
      currentMessageElement = null;
    }

    elements.sendBtn.addEventListener('click', sendMessage);

    // 回车发送
    elements.messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 页面加载时聚焦到 Token 输入
    elements.token.focus();
  </script>
</body>
</html>
